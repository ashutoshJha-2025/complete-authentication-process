
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--surface-0); }

  .topbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    background: var(--surface-2);
    border-bottom: 0.5px solid var(--border);
    gap: 1rem;
  }
  .topbar-left {
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border-accent);
  }
  .topbar-meta {
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.01em;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 8px;
  }
  .otp-inline {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-warning);
    border: 0.5px solid var(--border-warning);
    border-radius: var(--radius);
    padding: 5px 10px 5px 8px;
  }
  .otp-inline i { font-size: 14px; color: var(--text-warning); }
  .otp-inline input {
    width: 120px;
    border: none; background: transparent;
    font-size: 12px; color: var(--text-primary);
    outline: none; font-family: var(--font-mono);
    letter-spacing: 0.08em;
  }
  .otp-inline input::placeholder { color: var(--text-muted); font-family: var(--font-sans); letter-spacing: 0; }
  .otp-send {
    padding: 3px 8px;
    font-size: 11px; font-weight: 500;
    color: var(--text-warning);
    background: transparent;
    border: 0.5px solid var(--border-warning);
    border-radius: 5px;
    cursor: pointer;
  }
  .otp-send:hover { background: var(--fill-warning); color: var(--on-warning); }

  .btn-nav {
    padding: 6px 12px;
    font-size: 12px; font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer; border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-secondary);
    transition: background 0.15s;
  }
  .btn-nav:hover { background: var(--surface-1); color: var(--text-primary); }
  .btn-logout {
    color: var(--text-danger);
    border-color: var(--border-danger);
  }
  .btn-logout:hover { background: var(--bg-danger); border-color: var(--border-danger); }

  .page-body {
    max-width: 520px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  .avatar-row {
    display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem;
  }
  .avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--bg-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 500; color: var(--text-accent);
    flex-shrink: 0;
    border: 0.5px solid var(--border-accent);
  }
  .avatar-info h1 {
    font-size: 20px; font-weight: 500;
    color: var(--text-primary); line-height: 1.2;
  }
  .avatar-info p {
    font-size: 13px; color: var(--text-muted); margin-top: 2px;
  }

  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .info-card {
    background: var(--surface-1);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .info-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row-left {
    display: flex; align-items: center; gap: 10px;
  }
  .info-row-left i { font-size: 15px; color: var(--text-muted); }
  .info-row-key { font-size: 13px; color: var(--text-secondary); }
  .info-row-val { font-size: 13px; color: var(--text-primary); font-weight: 500; }

  .verified-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }
  .verified-badge.yes {
    background: var(--bg-success); color: var(--text-success);
    border: 0.5px solid var(--border-success);
  }
  .verified-badge.no {
    background: var(--bg-warning); color: var(--text-warning);
    border: 0.5px solid var(--border-warning);
  }
  .verified-badge i { font-size: 12px; }

  .otp-card {
    background: var(--surface-1);
    border: 0.5px solid var(--border-warning);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 1.25rem;
  }
  .otp-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }
  .otp-card-header i { font-size: 16px; color: var(--text-warning); }
  .otp-card-header span {
    font-size: 13px; font-weight: 500; color: var(--text-primary);
  }
  .otp-card-desc {
    font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5;
  }
  .otp-field-row {
    display: flex; gap: 8px;
  }
  .otp-field-row input {
    flex: 1; height: 36px; padding: 0 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-2);
    font-size: 13px; font-family: var(--font-mono);
    letter-spacing: 0.1em; color: var(--text-primary);
    outline: none;
  }
  .otp-field-row input:focus { border-color: var(--border-accent); }
  .otp-verify-btn {
    padding: 0 14px; height: 36px;
    font-size: 12px; font-weight: 500;
    border-radius: var(--radius); cursor: pointer;
    background: var(--fill-accent); color: var(--on-accent);
    border: none;
  }
  .otp-verify-btn:hover { background: var(--fill-accent-hover); }
</style>

<div style="min-height:500px; font-family: var(--font-sans);">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <span class="topbar-meta">Updated Jun 26, 2026</span>
    </div>

    <div class="topbar-right">
      <div class="otp-inline" title="Verify your email">
        <i class="ti ti-shield-lock" aria-hidden="true"></i>
        <input type="text" placeholder="Enter OTP" maxlength="6" id="topOtp" />
        <button class="otp-send">Verify</button>
      </div>
      <button class="btn-nav">Log in</button>
      <button class="btn-nav btn-logout">Log out</button>
    </div>
  </div>

  <div class="page-body">

    <div class="avatar-row">
      <div class="avatar" id="avatarEl">JD</div>
      <div class="avatar-info">
        <h1 id="nameDisplay">johndoe</h1>
        <p>Personal account</p>
      </div>
    </div>

    <p class="section-label">Account details</p>
    <div class="info-card">
      <div class="info-row">
        <div class="info-row-left">
          <i class="ti ti-user" aria-hidden="true"></i>
          <span class="info-row-key">Username</span>
        </div>
        <span class="info-row-val" id="usernameVal">johndoe</span>
      </div>
      <div class="info-row">
        <div class="info-row-left">
          <i class="ti ti-mail" aria-hidden="true"></i>
          <span class="info-row-key">Email</span>
        </div>
        <span class="info-row-val" id="emailVal">john@example.com</span>
      </div>
      <div class="info-row">
        <div class="info-row-left">
          <i class="ti ti-shield-check" aria-hidden="true"></i>
          <span class="info-row-key">Verification</span>
        </div>
        <span class="verified-badge no" id="verifiedBadge">
          <i class="ti ti-clock" aria-hidden="true"></i>
          Pending
        </span>
      </div>
    </div>

    <div class="otp-card" id="otpCardSection">
      <div class="otp-card-header">
        <i class="ti ti-mail-forward" aria-hidden="true"></i>
        <span>Verify your email</span>
      </div>
      <p class="otp-card-desc">A 6-digit code was sent to your email address. Enter it below to activate your account.</p>
      <div class="otp-field-row">
        <input type="text" placeholder="000000" maxlength="6" id="cardOtp" />
        <button class="otp-verify-btn" onclick="handleVerify()">Verify</button>
      </div>
    </div>

  </div>
</div>

<script>
  function handleVerify() {
    const val = document.getElementById('cardOtp').value || document.getElementById('topOtp').value;
    if (val.length === 6) {
      document.getElementById('verifiedBadge').className = 'verified-badge yes';
      document.getElementById('verifiedBadge').innerHTML = '<i class="ti ti-circle-check" aria-hidden="true"></i> Verified';
      document.getElementById('otpCardSection').style.display = 'none';
    }
  }
  document.getElementById('cardOtp').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/\D/g, '');
  });
  document.getElementById('topOtp').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/\D/g, '');
    document.getElementById('cardOtp').value = e.target.value;
  });
</script>
